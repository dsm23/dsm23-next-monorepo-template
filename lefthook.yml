pre-commit:
  parallel: true
  commands:
    oxfmt:
      run: ./node_modules/.bin/oxfmt --check --no-error-on-unmatched-pattern {staged_files}

    lint:
      run: ./node_modules/.bin/turbo run lint:lint-staged -- {staged_files}
      glob:
        - "*.ts"
        - "*.js"
        - "*.tsx"
        - "*.jsx"
        - "*.css"

commit-msg:
  commands:
    commitlint:
      run: ./node_modules/.bin/commitlint --edit {1}
